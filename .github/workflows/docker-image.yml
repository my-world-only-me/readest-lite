name: Docker Image

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest-linux-amd64,enable={{is_default_branch}}
            type=raw,value={{branch}}-linux-amd64
            type=sha,format=long,prefix=,prefix=,suffix=-linux-amd64
            type=semver,pattern={{version}}-linux-amd64
            type=semver,pattern={{major}}-linux-amd64

      - name: Set up Buildx (default driver)
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest-linux-arm64,enable={{is_default_branch}}
            type=raw,value={{branch}}-linux-arm64
            type=sha,format=long,prefix=,suffix=-linux-arm64
            type=semver,pattern={{version}}-linux-arm64
            type=semver,pattern={{major}}-linux-arm64

      - name: Set up Buildx (default driver)
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (arm64, native)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  merge-manifest:
    runs-on: ubuntu-latest
    needs: [build-and-push-amd64, build-and-push-arm64]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=sha,format=long

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge multi-arch manifest
        shell: bash
        run: |
          set -euo pipefail
          IMG="${{ env.REGISTRY }}/${{ github.repository }}"

          # 读所有 tag（每行一个完整引用）
          TAGS="${{ steps.meta.outputs.tags }}"
          echo "$TAGS" | while read -r TAG; do
            [ -z "$TAG" ] && continue
            TAG_NAME="${TAG##*:}"

            # 跳过 SHA 标签（platform 标签命名与其不一致）
            [[ "$TAG_NAME" == sha-* ]] && echo "  Skip SHA: $TAG_NAME" && continue

            AMD_TAG="${IMG}:${TAG_NAME}-linux-amd64"
            ARM_TAG="${IMG}:${TAG_NAME}-linux-arm64"

            # 检查 platform 标签是否存在
            if ! docker manifest inspect "$AMD_TAG" &>/dev/null; then
              echo "  WARN: $AMD_TAG not found, skipping"
              continue
            fi
            if ! docker manifest inspect "$ARM_TAG" &>/dev/null; then
              echo "  WARN: $ARM_TAG not found, skipping"
              continue
            fi

            echo "→ Merging manifest: $TAG"
            docker buildx imagetools create \
              -t "$TAG" \
              "$AMD_TAG" \
              "$ARM_TAG"
          done
