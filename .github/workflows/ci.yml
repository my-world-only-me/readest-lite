name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1
          run_install: false

      - name: Get pnpm store
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Setup vendors
        run: pnpm --filter @readest/readest-app setup-vendors

      - name: Generate Prisma Client
        run: pnpm --filter @readest/readest-app db:generate

      - name: Build web
        env:
          NEXT_PUBLIC_APP_PLATFORM: web
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:8225
          NEXT_PUBLIC_SUPABASE_ANON_KEY: anon
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8225/api
          NEXT_PUBLIC_OBJECT_STORAGE_TYPE: local
          NEXT_PUBLIC_STORAGE_FIXED_QUOTA: 0
          NEXT_PUBLIC_TRANSLATION_FIXED_QUOTA: 0
        run: pnpm --filter @readest/readest-app build-web

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: readest-lite:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
