name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: readest-lite:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test вЂ” container starts and auth works
        env:
          ADMIN_EMAIL: smoke@test.local
          ADMIN_PASSWORD: SmokeTestPass123!
        run: |
          set -e
          docker run --rm -d --name readest-smoke \
            -p 8225:8225 \
            -e ADMIN_EMAIL=$ADMIN_EMAIL \
            -e ADMIN_PASSWORD=$ADMIN_PASSWORD \
            -v readest_smoke_data:/data \
            readest-lite:ci

          # з­‰еѕ…е®№е™Ёе®Ње…ЁеђЇеЉЁпј€prisma db push + init admin еЏЇиѓЅи¦Ѓ 1-3 е€†й’џпј‰
          echo "Waiting for container to be ready..."
          for i in $(seq 1 180); do
            if curl -sf "http://localhost:8225/auth/v1/settings" > /dev/null 2>&1; then
              echo "вњ… Container ready after ${i}s"
              break
            fi
            if ! docker ps --format '{{.Names}}' | grep -q readest-smoke; then
              echo "вќЊ Container exited unexpectedly"
              docker logs readest-smoke 2>&1 || true
              exit 1
            fi
            sleep 1
          done

          # йЄЊиЇЃ settings з«Їз‚№
          SETTINGS=$(curl -sf "http://localhost:8225/auth/v1/settings" || echo "")
          echo "$SETTINGS" | grep -q disable_signup && echo "вњ… Settings OK" || {
            echo "вќЊ Settings endpoint failed"
            docker logs readest-smoke 2>&1 || true
            exit 1
          }

          # йЄЊиЇЃз™»еЅ•
          TOKEN=$(curl -sf -X POST "http://localhost:8225/auth/v1/token?grant_type=password" \
            -H "Content-Type: application/json" \
            -H "apikey: anon" \
            -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || echo "")
          if [ -n "$TOKEN" ] && [ "$TOKEN" != "" ]; then
            echo "вњ… Login OK"
          else
            echo "вќЊ Login failed"
            docker logs readest-smoke 2>&1 || true
            exit 1
          fi

          # йЄЊиЇЃжіЁе†Њиў«з¦Ѓз”Ё
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://localhost:8225/auth/v1/signup" \
            -H "Content-Type: application/json" -H "apikey: anon" \
            -d '{"email":"new@test.local","password":"123"}')
          [ "$HTTP_CODE" = "403" ] && echo "вњ… Signup disabled (403)" || {
            echo "вќЊ Signup should return 403, got $HTTP_CODE"
            exit 1
          }

          # йЄЊиЇЃеђЊж­Ґ API еЏ—дїќжЉ¤
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8225/api/sync?since=0")
          [ "$HTTP_CODE" = "403" ] && echo "вњ… Sync API requires auth (403)" || {
            echo "вќЊ Sync API should return 403 without token, got $HTTP_CODE"
            exit 1
          }

          # йЄЊиЇЃеђЊж­Ґ API её¦ token еЏЇе·ҐдЅњ
          SYNC_RESP=$(curl -sf "http://localhost:8225/api/sync?since=0" \
            -H "Authorization: Bearer $TOKEN" || echo "")
          echo "$SYNC_RESP" | grep -q '"books"' && echo "вњ… Sync API works with token" || {
            echo "вќЊ Sync API failed with valid token"
            echo "Response: $SYNC_RESP"
            exit 1
          }

          echo ""
          echo "рџЋ‰ All smoke tests passed!"
          docker stop readest-smoke || true
