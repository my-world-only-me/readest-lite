name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: readest-lite:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container starts and auth works
        env:
          ADMIN_EMAIL: smoke@test.local
          ADMIN_PASSWORD: SmokeTestPass123!
        run: |
          set -e
          docker run --rm -d --name readest-smoke \
            -p 8225:8225 \
            -e ADMIN_EMAIL=$ADMIN_EMAIL \
            -e ADMIN_PASSWORD=$ADMIN_PASSWORD \
            -e DATABASE_URL=file:/data/db/readest.db \
            -v readest_smoke_data:/data \
            readest-lite:ci

          # 等待容器完全启动
          echo "Waiting for container to be ready..."
          READY=0
          for i in $(seq 1 180); do
            # 先用 docker exec 在容器内测试（排除端口映射问题）
            if docker exec readest-smoke curl -sf "http://127.0.0.1:8225/api/auth/v1/settings" > /dev/null 2>&1; then
              echo "✅ Container ready (internal) after ${i}s"
              READY=1
              break
            fi
            if ! docker ps --format '{{.Names}}' | grep -q readest-smoke; then
              echo "❌ Container exited unexpectedly"
              docker logs readest-smoke 2>&1 || true
              exit 1
            fi
            sleep 1
          done

          if [ "$READY" = "0" ]; then
            echo "❌ Container not ready after 180s"
            echo "=== Container logs ==="
            docker logs readest-smoke 2>&1 || true
            echo "=== Container exec test ==="
            docker exec readest-smoke curl -v "http://127.0.0.1:8225/api/auth/v1/settings" 2>&1 || true
            exit 1
          fi

          # 用端口映射从宿主机测试
          SETTINGS=$(curl -sf "http://localhost:8225/api/auth/v1/settings" || echo "")
          echo "$SETTINGS" | grep -q disable_signup && echo "✅ Settings OK (external)" || {
            echo "⚠️ External access failed, but internal works. Checking port mapping..."
            docker port readest-smoke || true
            # 用 docker exec 作为 fallback
            SETTINGS=$(docker exec readest-smoke curl -sf "http://127.0.0.1:8225/api/auth/v1/settings" || echo "")
            echo "$SETTINGS" | grep -q disable_signup && echo "✅ Settings OK (internal)" || {
              echo "❌ Settings endpoint completely failed"
              exit 1
            }
          }

          # 验证登录（用 docker exec 确保）
          TOKEN=$(docker exec readest-smoke curl -sf -X POST "http://127.0.0.1:8225/api/auth/v1/token?grant_type=password" \
            -H "Content-Type: application/json" \
            -H "apikey: anon" \
            -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || echo "")

          if [ -n "$TOKEN" ] && [ "$TOKEN" != "" ]; then
            echo "✅ Login OK"
          else
            echo "❌ Login failed"
            docker exec readest-smoke curl -v -X POST "http://127.0.0.1:8225/api/auth/v1/token?grant_type=password" \
              -H "Content-Type: application/json" \
              -H "apikey: anon" \
              -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}" 2>&1 || true
            exit 1
          fi

          # 验证注册被禁用
          HTTP_CODE=$(docker exec readest-smoke curl -s -o /dev/null -w "%{http_code}" -X POST "http://127.0.0.1:8225/api/auth/v1/signup" \
            -H "Content-Type: application/json" -H "apikey: anon" \
            -d '{"email":"new@test.local","password":"123"}')
          [ "$HTTP_CODE" = "403" ] && echo "✅ Signup disabled (403)" || {
            echo "❌ Signup should return 403, got $HTTP_CODE"
            exit 1
          }

          # 验证同步 API 受保护
          HTTP_CODE=$(docker exec readest-smoke curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:8225/api/sync?since=0")
          [ "$HTTP_CODE" = "403" ] && echo "✅ Sync API requires auth (403)" || {
            echo "❌ Sync API should return 403 without token, got $HTTP_CODE"
            exit 1
          }

          # 验证同步 API 带 token 可工作
          SYNC_RESP=$(docker exec readest-smoke curl -sf "http://127.0.0.1:8225/api/sync?since=0" \
            -H "Authorization: Bearer $TOKEN" || echo "")
          echo "$SYNC_RESP" | grep -q '"books"' && echo "✅ Sync API works with token" || {
            echo "❌ Sync API failed with valid token"
            echo "Response: $SYNC_RESP"
            exit 1
          }

          echo ""
          echo "🎉 All smoke tests passed!"
          docker stop readest-smoke || true
