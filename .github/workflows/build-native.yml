# .github/workflows/build-native.yml
name: Build & Push (native)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build'
        default: 'linux/amd64,linux/arm64'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    
    runs-on: ${{ matrix.runner }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=,suffix=-${{ matrix.platform }}
      
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # 原生构建，不需要 swap
          cache-from: type=gha
          cache-to: type=gha,mode=min

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create multi-arch manifest
        run: |
          SHA="${{ github.sha }}"
          # 先 push 两个单架构 tag
          docker manifest create ghcr.io/${{ github.repository }}:latest \
            ghcr.io/${{ github.repository }}:${SHA}-linux/amd64 \
            ghcr.io/${{ github.repository }}:${SHA}-linux/arm64
          docker manifest push ghcr.io/${{ github.repository }}:latest
          # 也 push sha tag（可选）
          docker manifest create ghcr.io/${{ github.repository }}:${SHA} \
            ghcr.io/${{ github.repository }}:${SHA}-linux/amd64 \
            ghcr.io/${{ github.repository }}:${SHA}-linux/arm64
          docker manifest push ghcr.io/${{ github.repository }}:${SHA}
