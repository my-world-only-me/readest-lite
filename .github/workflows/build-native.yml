# ───────────────────────────────────────────────────────────────────────────
# Build Docker Image — Native Matrix (no QEMU)
#
# 用 GitHub 原生 runner 分别构建 amd64 + arm64，最后合并多架构 manifest。
# 不依赖 QEMU 模拟，不会 OOM。
#
# Runner 资源：
#   ubuntu-latest     → 7GB RAM / 4 vCPU (amd64 原生)
#   ubuntu-24.04-arm  → 4GB RAM / 4 vCPU (arm64 原生)
# ───────────────────────────────────────────────────────────────────────────

name: Build & Push (Native)

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 生成带平台后缀的 tag ───────────────────────────────────
      # 把 linux/amd64 转为 linux-amd64（Docker tag 不允许斜杠）
      - name: Generate platform tag suffix
        id: tag
        run: |
          SUFFIX="${{ matrix.platform }}"
          SUFFIX="${SUFFIX//\//-}"
          echo "suffix=${SUFFIX}" >> "$GITHUB_OUTPUT"

      - name: Build and push (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.optimized
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}-${{ steps.tag.outputs.suffix }}
            ghcr.io/${{ github.repository }}:latest-${{ steps.tag.outputs.suffix }}
          # 用 inline cache（随镜像推送，不依赖 GHA cache 后端）
          cache-from: type=gha
          cache-to: type=inline

  # ── 合并多架构 manifest ────────────────────────────────────────
  merge:
    needs: build
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge multi-arch manifest
        run: |
          SHA="${{ github.sha }}"

          # latest (多架构)
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest \
            ghcr.io/${{ github.repository }}:${SHA}-linux-amd64 \
            ghcr.io/${{ github.repository }}:${SHA}-linux-arm64

          # SHA tag (多架构)
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:${SHA} \
            ghcr.io/${{ github.repository }}:${SHA}-linux-amd64 \
            ghcr.io/${{ github.repository }}:${SHA}-linux-arm64

          # 如果是 git tag 推送，推 semver 多架构 tag
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            docker buildx imagetools create \
              -t ghcr.io/${{ github.repository }}:${TAG_NAME} \
              ghcr.io/${{ github.repository }}:${SHA}-linux-amd64 \
              ghcr.io/${{ github.repository }}:${SHA}-linux-arm64
          fi

      - name: Verify result
        run: |
          echo "=== Multi-arch manifest ==="
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:latest
